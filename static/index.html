function JobCard({ job, isSaved, savedIds, onSave, onRemove }) {
    const id = job.job_id || job.id;
    const contractClass = (job.contract_type || '').toLowerCase() === 'stage' ? 'stage' : 'alternance';

    return (
        <article className="job-card">
            <div className="job-card-header">
                <div>
                    <h3>{sanitizeText(job.title) || 'Sans titre'}</h3>
                    {job.company && <div className="job-company">{sanitizeText(job.company)}</div>}
                    {job.location && <div className="job-location">{sanitizeText(job.location)}</div>}
                </div>
            </div>
            <div className="job-badges">
                {job.platform && <span className="platform-badge">{sanitizeText(job.platform)}</span>}
                {job.contract_type && (
                    <span className={`contract-badge ${contractClass}`}>
                        {sanitizeText(job.contract_type)}
                    </span>
                )}
            </div>
            <div className="job-desc">{truncate(sanitizeText(job.description), 180)}</div>
            <div className="job-actions">
                {job.url && (
                    <a href={safeHref(job.url)} target="_blank" rel="noopener noreferrer" className="btn btn-outline btn-sm">
                        Voir l'offre
                    </a>
                )}
                {isSaved ? (
                    <button className="btn btn-outline btn-sm" style={{ color: 'var(--color-danger)', borderColor: 'var(--color-danger)' }} onClick={() => onRemove(id)} title="Retirer des favoris">
                        Retirer
                    </button>
                ) : (
                    <button className={`heart-btn${savedIds.has(id) ? ' saved' : ''}`} onClick={() => onSave(job)} title="Sauvegarder l'offre" aria-label="Sauvegarder l'offre">
                        <Icon.Heart filled={savedIds.has(id)} />
                    </button>
                )}
            </div>
        </article>
    );
}

function StudentOffres({ toast }) {
    const [keywords, setKeywords] = useState('');
    const [sector, setSector] = useState('');
    const [location, setLocation] = useState('Paris');
    const [results, setResults] = useState([]);
    const [savedJobs, setSavedJobs] = useState([]);
    const [savedIds, setSavedIds] = useState(new Set());
    const [searching, setSearching] = useState(false);
    const [tab, setTab] = useState('results');
    const [loadingSaved, setLoadingSaved] = useState(false);
    const [hasSearched, setHasSearched] = useState(false);

    const fetchSaved = useCallback(async () => {
        setLoadingSaved(true);
        try {
            const d = await api('/api/student/saved-jobs');
            const jobs = Array.isArray(d) ? d : d.jobs || [];
            setSavedJobs(jobs);
            setSavedIds(new Set(jobs.map((j) => j.job_id || j.id)));
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setLoadingSaved(false);
        }
    }, [toast]);

    useEffect(() => { fetchSaved(); }, [fetchSaved]);

    const handleSearch = useCallback(async (e) => {
        e.preventDefault();
        if (!keywords.trim()) return;
        setSearching(true);
        setHasSearched(true);
        setTab('results');
        try {
            const d = await api('/api/student/search', {
                method: 'POST',
                body: JSON.stringify({ keywords, sector, location }),
            });
            setResults(Array.isArray(d) ? d : d.jobs || d.results || []);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSearching(false);
        }
    }, [keywords, sector, location, toast]);

    const handleSave = useCallback(async (job) => {
        try {
            await api('/api/student/save-job', {
                method: 'POST',
                body: JSON.stringify({
                    title: job.title || '',
                    company: job.company || '',
                    location: job.location || '',
                    url: job.url || '',
                    platform: job.platform || '',
                    description: job.description || '',
                    contract_type: job.contract_type || '',
                    sector: job.sector || '',
                    score: job.score || 0,
                    explanation: job.explanation || '',
                }),
            });
            setSavedIds((prev) => new Set([...prev, job.job_id || job.id]));
            toast('Offre sauvegardee');
            fetchSaved();
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [toast, fetchSaved]);

    const handleRemove = useCallback(async (jobId) => {
        try {
            await api(`/api/student/saved-jobs/${jobId}`, { method: 'DELETE' });
            setSavedIds((prev) => { const n = new Set(prev); n.delete(jobId); return n; });
            toast('Offre retiree');
            fetchSaved();
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [toast, fetchSaved]);

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Offres de stage</h1>
                <p className="page-subtitle">Explorez les opportunites dans le secteur culturel</p>
            </div>
            <form className="search-form" onSubmit={handleSearch} role="search">
                <div className="form-group keyword">
                    <label htmlFor="search-keywords">Mots-cles</label>
                    <input id="search-keywords" className="input" type="text" value={keywords} onChange={(e) => setKeywords(e.target.value)} placeholder="Ex: assistant curateur art contemporain" maxLength={200} />
                </div>
                <div className="form-group">
                    <label htmlFor="search-sector">Secteur</label>
                    <select id="search-sector" className="input" value={sector} onChange={(e) => setSector(e.target.value)}>
                        <option value="">Tous les secteurs</option>
                        {SECTORS.map((s) => <option key={s} value={s}>{s}</option>)}
                    </select>
                </div>
                <div className="form-group">
                    <label htmlFor="search-location">Localisation</label>
                    <input id="search-location" className="input" type="text" value={location} onChange={(e) => setLocation(e.target.value)} placeholder="Paris" maxLength={100} />
                </div>
                <button className="btn btn-primary" type="submit" disabled={searching} style={{ height: 42, marginBottom: 0 }}>
                    {searching ? 'Recherche...' : 'Rechercher'}
                </button>
            </form>

            <div className="tabs" role="tablist" aria-label="Resultats de recherche">
                <button className={`tab${tab === 'results' ? ' active' : ''}`} role="tab" aria-selected={tab === 'results'} onClick={() => setTab('results')}>
                    Resultats {hasSearched ? `(${results.length})` : ''}
                </button>
                <button className={`tab${tab === 'saved' ? ' active' : ''}`} role="tab" aria-selected={tab === 'saved'} onClick={() => { setTab('saved'); fetchSaved(); }}>
                    Sauvegardees ({savedJobs.length})
                </button>
            </div>

            {tab === 'results' && (
                searching ? <Spinner /> : (
                    hasSearched ? (
                        results.length > 0
                            ? <div className="job-cards">{results.map((j) => <JobCard key={j.job_id || j.id || Math.random()} job={j} isSaved={false} savedIds={savedIds} onSave={handleSave} onRemove={handleRemove} />)}</div>
                            : <EmptyState>Aucune offre pour le moment. Essayez d'autres mots-cles ou un secteur different.</EmptyState>
                    ) : <EmptyState>Lancez une recherche pour decouvrir les opportunites de stage dans le secteur culturel.</EmptyState>
                )
            )}

            {tab === 'saved' && (
                loadingSaved ? <Spinner /> : (
                    savedJobs.length > 0
                        ? <div className="job-cards">{savedJobs.map((j) => <JobCard key={j.job_id || j.id} job={j} isSaved={true} savedIds={savedIds} onSave={handleSave} onRemove={handleRemove} />)}</div>
                        : <EmptyState>Aucune offre sauvegardee pour le moment. Explorez les offres et sauvegardez celles qui vous interessent.</EmptyState>
                )
            )}
        </section>
    );
}

/* ===== Student: Suivi (Application Tracking) ===== */

function StudentSuivi({ toast }) {
    const [apps, setApps] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showModal, setShowModal] = useState(false);
    const [form, setForm] = useState({ title: '', company: '', url: '', notes: '' });
    const [creating, setCreating] = useState(false);

    const fetchApps = useCallback(async () => {
        try {
            const d = await api('/api/student/applications');
            setApps(Array.isArray(d) ? d : d.applications || []);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setLoading(false);
        }
    }, [toast]);

    useEffect(() => { fetchApps(); }, [fetchApps]);

    const handleAdd = useCallback(async (e) => {
        e.preventDefault();
        setCreating(true);
        try {
            await api('/api/student/applications', {
                method: 'POST',
                body: JSON.stringify({
                    job_title: form.title,
                    title: form.title,
                    company: form.company,
                    url: form.url,
                    notes: form.notes,
                    status: 'a_envoyer',
                }),
            });
            toast('Candidature ajoutee');
            setShowModal(false);
            setForm({ title: '', company: '', url: '', notes: '' });
            fetchApps();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setCreating(false);
        }
    }, [form, toast, fetchApps]);

    const handleStatusChange = useCallback(async (id, newStatus) => {
        try {
            const app = apps.find((a) => a.id === id);
            await api(`/api/student/applications/${id}`, {
                method: 'PATCH',
                body: JSON.stringify({ status: newStatus, notes: app?.notes || '' }),
            });
            setApps((prev) => prev.map((a) => a.id === id ? { ...a, status: newStatus } : a));
            const statusLabel = TRACKING_STATUSES.find((s) => s.value === newStatus)?.label || newStatus;
            toast(`Statut mis a jour : ${statusLabel}`);
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [apps, toast]);

    const handleDelete = useCallback(async (id) => {
        if (!confirm('Supprimer cette candidature ?')) return;
        try {
            await api(`/api/student/applications/${id}`, { method: 'DELETE' });
            toast('Candidature supprimee');
            setApps((prev) => prev.filter((a) => a.id !== id));
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [toast]);

    const updateFormField = useCallback((field, value) => {
        setForm((prev) => ({ ...prev, [field]: value }));
    }, []);

    return (
        <section className="fade-in">
            <div className="page-header">
                <div>
                    <h1 className="page-title">Mes candidatures</h1>
                    <p className="page-subtitle">Suivez l'avancement de vos demarches</p>
                </div>
                <button className="btn btn-primary btn-sm" onClick={() => setShowModal(true)} aria-label="Ajouter une candidature">
                    <Icon.Plus /> Ajouter
                </button>
            </div>

            {loading ? <Spinner /> : (
                apps.length > 0 ? (
                    <div style={{ overflowX: 'auto' }}>
                        <table className="tracking-table">
                            <thead>
                                <tr>
                                    <th>Poste</th>
                                    <th>Entreprise</th>
                                    <th>Statut</th>
                                    <th>Date</th>
                                    <th>Notes</th>
                                    <th><span className="sr-only">Actions</span></th>
                                </tr>
                            </thead>
                            <tbody>
                                {apps.map((a) => (
                                    <tr key={a.id}>
                                        <td style={{ fontWeight: 500, color: 'var(--color-heading)' }}>{sanitizeText(a.job_title || a.title) || '-'}</td>
                                        <td>{sanitizeText(a.company) || '-'}</td>
                                        <td>
                                            <select className="status-select" value={a.status || 'a_envoyer'} onChange={(e) => handleStatusChange(a.id, e.target.value)} aria-label="Changer le statut">
                                                {TRACKING_STATUSES.map((s) => <option key={s.value} value={s.value}>{s.label}</option>)}
                                            </select>
                                        </td>
                                        <td style={{ fontSize: 12, color: 'var(--color-text-muted)' }}>{relativeTime(a.created_at || a.date)}</td>
                                        <td style={{ fontSize: 13, color: 'var(--color-text-muted)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                            {sanitizeText(a.notes) || '-'}
                                        </td>
                                        <td>
                                            <button className="btn btn-outline btn-sm" style={{ color: 'var(--color-danger)', borderColor: '#fecaca', padding: '4px 8px' }} onClick={() => handleDelete(a.id)} title="Supprimer la candidature" aria-label="Supprimer la candidature">
                                                <Icon.Trash />
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                ) : <EmptyState>Aucune candidature pour le moment. Ajoutez une candidature pour commencer le suivi de vos demarches.</EmptyState>
            )}

            {showModal && (
                <Modal onClose={() => setShowModal(false)}>
                    <h2>Ajouter une candidature</h2>
                    <form onSubmit={handleAdd} noValidate>
                        <div className="form-group">
                            <label htmlFor="app-title">Titre du poste</label>
                            <input id="app-title" className="input" type="text" value={form.title} onChange={(e) => updateFormField('title', e.target.value)} placeholder="Ex: Stage assistant curateur" required maxLength={200} />
                        </div>
                        <div className="form-group">
                            <label htmlFor="app-company">Entreprise</label>
                            <input id="app-company" className="input" type="text" value={form.company} onChange={(e) => updateFormField('company', e.target.value)} placeholder="Nom de l'entreprise" required maxLength={200} />
                        </div>
                        <div className="form-group">
                            <label htmlFor="app-url">URL de l'offre (optionnel)</label>
                            <input id="app-url" className="input" type="url" value={form.url} onChange={(e) => updateFormField('url', e.target.value)} placeholder="https://..." maxLength={500} />
                        </div>
                        <div className="form-group">
                            <label htmlFor="app-notes">Notes</label>
                            <textarea id="app-notes" className="input" rows={3} value={form.notes} onChange={(e) => updateFormField('notes', e.target.value)} placeholder="Notes personnelles..." style={{ resize: 'vertical' }} maxLength={1000}></textarea>
                        </div>
                        <div className="flex-row">
                            <button type="button" className="btn btn-outline btn-sm" onClick={() => setShowModal(false)}>Annuler</button>
                            <button type="submit" className="btn btn-primary btn-sm" disabled={creating}>
                                {creating ? 'Ajout...' : 'Ajouter'}
                            </button>
                        </div>
                    </form>
                </Modal>
            )}
        </section>
    );
}

/* ===== Student: Mon Profil ===== */

function StudentProfil({ user, toast }) {
    const [profile, setProfile] = useState({ first_name: '', last_name: '', school_id: '', promo: '', sector: '' });
    const [schools, setSchools] = useState([]);
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [hasCv, setHasCv] = useState(false);
    const [cvFilename, setCvFilename] = useState('');
    const [uploading, setUploading] = useState(false);
    const fileRef = useRef(null);

    useEffect(() => {
        Promise.all([
            api('/api/student/profile').catch(() => ({})),
            api('/api/schools').catch(() => []),
        ]).then(([p, s]) => {
            setProfile({
                first_name: p.first_name || p.prenom || '',
                last_name: p.last_name || p.nom || '',
                school_id: p.school_id || '',
                promo: p.promo || '',
                sector: p.sector || p.secteur || '',
            });
            setHasCv(p.has_cv || false);
            setCvFilename(p.cv_filename || '');
            setSchools(Array.isArray(s) ? s : s.schools || []);
            setLoading(false);
        });
    }, []);

    const updateField = useCallback((field, value) => {
        setProfile((prev) => ({ ...prev, [field]: value }));
    }, []);

    const handleSave = useCallback(async (e) => {
        e.preventDefault();
        setSaving(true);
        try {
            await api('/api/student/profile', { method: 'POST', body: JSON.stringify(profile) });
            toast('Profil sauvegarde');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSaving(false);
        }
    }, [profile, toast]);

    const uploadCv = useCallback(async (file) => {
        if (!file) return;
        setUploading(true);
        try {
            const fd = new FormData();
            fd.append('file', file);
            await api('/api/student/upload-cv', { method: 'POST', body: fd, headers: {} });
            setHasCv(true);
            setCvFilename(file.name);
            toast('CV telecharge');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setUploading(false);
        }
    }, [toast]);

    if (loading) {
        return (
            <section>
                <h1 className="page-title">Mon profil</h1>
                <Spinner />
            </section>
        );
    }

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Mon profil</h1>
                <p className="page-subtitle">Completez vos informations pour optimiser vos recherches</p>
            </div>
            <div className="card">
                <form onSubmit={handleSave} noValidate>
                    <div className="grid-2">
                        <div className="form-group">
                            <label htmlFor="profil-firstname">Prenom</label>
                            <input id="profil-firstname" className="input" type="text" value={profile.first_name} onChange={(e) => updateField('first_name', e.target.value)} maxLength={100} autoComplete="given-name" />
                        </div>
                        <div className="form-group">
                            <label htmlFor="profil-lastname">Nom</label>
                            <input id="profil-lastname" className="input" type="text" value={profile.last_name} onChange={(e) => updateField('last_name', e.target.value)} maxLength={100} autoComplete="family-name" />
                        </div>
                    </div>
                    <div className="form-group">
                        <label htmlFor="profil-school">Ecole</label>
                        <select id="profil-school" className="input" value={profile.school_id} onChange={(e) => updateField('school_id', e.target.value)}>
                            <option value="">Selectionnez votre ecole</option>
                            {schools.map((s) => <option key={s.id} value={s.id}>{sanitizeText(s.name || s.nom)}</option>)}
                        </select>
                    </div>
                    <div className="grid-2">
                        <div className="form-group">
                            <label htmlFor="profil-promo">Promotion</label>
                            <input id="profil-promo" className="input" type="text" value={profile.promo} onChange={(e) => updateField('promo', e.target.value)} placeholder="Ex: Bachelor 3" maxLength={50} />
                        </div>
                        <div className="form-group">
                            <label htmlFor="profil-sector">Secteur cible</label>
                            <select id="profil-sector" className="input" value={profile.sector} onChange={(e) => updateField('sector', e.target.value)}>
                                <option value="">Choisir un secteur</option>
                                {SECTORS.map((s) => <option key={s} value={s}>{s}</option>)}
                            </select>
                        </div>
                    </div>
                    <button className="btn btn-primary" type="submit" disabled={saving}>
                        {saving ? 'Sauvegarde...' : 'Sauvegarder'}
                    </button>
                </form>
            </div>

            <div className="card">
                <h3 className="card-title">Mon CV</h3>
                <p className="card-subtitle">Votre CV au format PDF</p>
                {hasCv ? (
                    <div className="flex-center">
                        <span style={{ fontSize: 13, color: 'var(--color-text-secondary)' }}>{sanitizeText(cvFilename) || 'CV.pdf'}</span>
                        <a href="/api/student/cv" target="_blank" rel="noopener noreferrer" className="btn btn-outline btn-sm" aria-label="Voir le CV">Voir</a>
                        <button className="btn btn-outline btn-sm" onClick={() => fileRef.current?.click()} disabled={uploading}>
                            {uploading ? 'Telechargement...' : 'Remplacer'}
                        </button>
                        <input ref={fileRef} type="file" accept=".pdf" hidden onChange={(e) => uploadCv(e.target.files[0])} aria-label="Remplacer le CV" />
                    </div>
                ) : (
                    <div>
                        <button className="btn btn-outline btn-sm" onClick={() => fileRef.current?.click()} disabled={uploading}>
                            {uploading ? 'Telechargement...' : 'Telecharger un CV'}
                        </button>
                        <input ref={fileRef} type="file" accept=".pdf" hidden onChange={(e) => uploadCv(e.target.files[0])} aria-label="Telecharger un CV" />
                    </div>
                )}
            </div>
        </section>
    );
}

/* ===== Student: Messages ===== */

function StudentMessages({ toast }) {
    const [messages, setMessages] = useState([]);
    const [loading, setLoading] = useState(true);
    const [text, setText] = useState('');
    const [sending, setSending] = useState(false);
    const chatBodyRef = useRef(null);

    const fetchMessages = useCallback(() => {
        api('/api/student/messages')
            .then((d) => setMessages(Array.isArray(d) ? d : d.messages || []))
            .catch((err) => toast(err.message, 'error'))
            .finally(() => setLoading(false));
    }, [toast]);

    useEffect(() => { fetchMessages(); }, [fetchMessages]);

    useEffect(() => {
        if (chatBodyRef.current) {
            chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight;
        }
    }, [messages]);

    const sendMessage = useCallback(async () => {
        if (!text.trim()) return;
        setSending(true);
        try {
            await api('/api/student/messages', { method: 'POST', body: JSON.stringify({ content: text }) });
            setText('');
            fetchMessages();
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSending(false);
        }
    }, [text, toast, fetchMessages]);

    const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }, [sendMessage]);

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Messages</h1>
                <p className="page-subtitle">Echangez avec le service relations entreprises</p>
            </div>
            <div className="messaging-layout" style={{ height: 'calc(100vh - 180px)' }}>
                <div className="msg-chat" style={{ width: '100%' }}>
                    <div className="msg-chat-header">Conversation avec le service relations entreprises</div>
                    <div className="msg-chat-body" ref={chatBodyRef}>
                        {loading ? <Spinner /> : (
                            messages.length > 0 ? messages.map((m, i) => (
                                <div key={m.id || i} className={`msg-bubble ${m.from_admin ? 'received' : 'sent'}`}>
                                    <div>{sanitizeText(m.content || m.message || m.text)}</div>
                                    <div className="msg-bubble-time">{relativeTime(m.sent_at || m.created_at || m.date)}</div>
                                </div>
                            )) : <div className="msg-empty">Aucun message pour le moment. N'hesitez pas a nous contacter pour toute question.</div>
                        )}
                    </div>
                    <div className="msg-input-area">
                        <input
                            className="input"
                            type="text"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="Ecrire un message..."
                            onKeyDown={handleKeyDown}
                            maxLength={2000}
                            aria-label="Message"
                        />
                        <button className="btn btn-primary btn-sm" onClick={sendMessage} disabled={sending || !text.trim()}>
                            {sending ? '...' : 'Envoyer'}
                        </button>
                    </div>
                </div>
            </div>
        </section>
    );
}

/* ===== Admin: Recherche de stages ===== */

function AdminSearch({ toast }) {
    const [keywords, setKeywords] = useState('');
    const [sector, setSector] = useState('');
    const [location, setLocation] = useState('Paris');
    const [results, setResults] = useState([]);
    const [searching, setSearching] = useState(false);
    const [hasSearched, setHasSearched] = useState(false);
    const [students, setStudents] = useState([]);
    const [recommendModal, setRecommendModal] = useState(null);
    const [selectedStudent, setSelectedStudent] = useState('');
    const [sending, setSending] = useState(false);

    useEffect(() => {
        (async () => {
            try {
                const d = await api('/api/admin/students');
                setStudents(Array.isArray(d) ? d : d.students || []);
            } catch (_) {}
        })();
    }, []);

    const handleSearch = useCallback(async (e) => {
        e.preventDefault();
        if (!keywords.trim()) return;
        setSearching(true);
        setHasSearched(true);
        try {
            const d = await api('/api/admin/search', {
                method: 'POST',
                body: JSON.stringify({ keywords, sector, location }),
            });
            setResults(Array.isArray(d) ? d : d.jobs || d.results || []);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSearching(false);
        }
    }, [keywords, sector, location, toast]);

    const handleRecommend = useCallback(async () => {
        if (!selectedStudent || !recommendModal) return;
        setSending(true);
        try {
            await api('/api/admin/recommend-job', {
                method: 'POST',
                body: JSON.stringify({
                    student_id: parseInt(selectedStudent),
                    job_title: recommendModal.title || '',
                    job_company: recommendModal.company || '',
                    job_url: recommendModal.url || '',
                    job_description: recommendModal.description || '',
                }),
            });
            toast('Offre envoyee a l\'etudiant par message');
            setRecommendModal(null);
            setSelectedStudent('');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSending(false);
        }
    }, [selectedStudent, recommendModal, toast]);

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Recherche de stages</h1>
                <p className="page-subtitle">Trouvez des offres et recommandez-les a vos etudiants</p>
            </div>
            <form className="search-form" onSubmit={handleSearch} role="search">
                <div className="form-group keyword">
                    <label htmlFor="admin-search-keywords">Mots-cles</label>
                    <input id="admin-search-keywords" className="input" type="text" value={keywords} onChange={(e) => setKeywords(e.target.value)} placeholder="Ex: assistant curateur art contemporain" maxLength={200} />
                </div>
                <div className="form-group">
                    <label htmlFor="admin-search-sector">Secteur</label>
                    <select id="admin-search-sector" className="input" value={sector} onChange={(e) => setSector(e.target.value)}>
                        <option value="">Tous les secteurs</option>
                        {SECTORS.map((s) => <option key={s} value={s}>{s}</option>)}
                    </select>
                </div>
                <div className="form-group">
                    <label htmlFor="admin-search-location">Localisation</label>
                    <input id="admin-search-location" className="input" type="text" value={location} onChange={(e) => setLocation(e.target.value)} placeholder="Paris" maxLength={100} />
                </div>
                <button className="btn btn-primary" type="submit" disabled={searching} style={{ height: 42, marginBottom: 0 }}>
                    {searching ? 'Recherche...' : 'Rechercher'}
                </button>
            </form>

            {searching && <Spinner />}

            {!searching && hasSearched && results.length === 0 && (
                <EmptyState>Aucune offre trouvee. Essayez d'autres mots-cles ou un secteur different.</EmptyState>
            )}

            {!searching && !hasSearched && (
                <EmptyState>Lancez une recherche pour trouver des offres de stage a recommander a vos etudiants.</EmptyState>
            )}

            {!searching && results.length > 0 && (
                <div className="job-cards">
                    {results.map((job) => (
                        <article className="job-card" key={job.job_id || job.id || Math.random()}>
                            <div className="job-card-header">
                                <div>
                                    <h3>{sanitizeText(job.title) || 'Sans titre'}</h3>
                                    {job.company && <div className="job-company">{sanitizeText(job.company)}</div>}
                                    {job.location && <div className="job-location">{sanitizeText(job.location)}</div>}
                                </div>
                            </div>
                            <div className="job-badges">
                                {job.platform && <span className="platform-badge">{sanitizeText(job.platform)}</span>}
                                {job.contract_type && (
                                    <span className={`contract-badge ${(job.contract_type || '').toLowerCase() === 'stage' ? 'stage' : 'alternance'}`}>
                                        {sanitizeText(job.contract_type)}
                                    </span>
                                )}
                            </div>
                            <div className="job-desc">{truncate(sanitizeText(job.description), 180)}</div>
                            <div className="job-actions">
                                {job.url && (
                                    <a href={safeHref(job.url)} target="_blank" rel="noopener noreferrer" className="btn btn-outline btn-sm">
                                        Voir l'offre
                                    </a>
                                )}
                                <button className="btn btn-primary btn-sm" onClick={() => { setRecommendModal(job); setSelectedStudent(''); }}
                                    title="Envoyer cette offre a un etudiant">
                                    Recommander
                                </button>
                            </div>
                        </article>
                    ))}
                </div>
            )}

            {recommendModal && (
                <Modal onClose={() => setRecommendModal(null)}>
                    <h2 style={{ marginBottom: 4 }}>Recommander cette offre</h2>
                    <p style={{ color: 'var(--color-text-secondary)', marginBottom: 16, fontSize: 13 }}>
                        <strong>{sanitizeText(recommendModal.title)}</strong>
                        {recommendModal.company ? ` — ${sanitizeText(recommendModal.company)}` : ''}
                    </p>
                    <div className="form-group">
                        <label htmlFor="recommend-student">Selectionner un etudiant</label>
                        <select id="recommend-student" className="input" value={selectedStudent} onChange={(e) => setSelectedStudent(e.target.value)}>
                            <option value="">-- Choisir un etudiant --</option>
                            {students.map((s) => (
                                <option key={s.id} value={s.id}>
                                    {s.first_name} {s.last_name} {s.email ? `(${s.email})` : ''}
                                </option>
                            ))}
                        </select>
                    </div>
                    <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16 }}>
                        <button className="btn btn-outline btn-sm" onClick={() => setRecommendModal(null)}>Annuler</button>
                        <button className="btn btn-primary btn-sm" onClick={handleRecommend} disabled={!selectedStudent || sending}>
                            {sending ? 'Envoi...' : 'Envoyer par message'}
                        </button>
                    </div>
                </Modal>
            )}
        </section>
    );
}

/* ===== Admin: Dashboard ===== */

function AdminDashboard({ toast, setPage }) {
    const [stats, setStats] = useState([]);
    const [students, setStudents] = useState([]);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        Promise.all([
            api('/api/admin/stats').catch(() => []),
            api('/api/admin/students').catch(() => []),
        ]).then(([statsData, studentsData]) => {
            setStats(Array.isArray(statsData) ? statsData : statsData.schools || statsData.stats || []);
            setStudents(Array.isArray(studentsData) ? studentsData : studentsData.students || []);
        }).finally(() => setLoading(false));
    }, []);

    const totals = useMemo(() => {
        const totalStudents = stats.reduce((sum, s) => sum + (s.total ?? 0), 0);
        const totalFound = stats.reduce((sum, s) => sum + (s.found ?? 0), 0);
        const totalSearching = stats.reduce((sum, s) => sum + (s.searching ?? 0), 0);
        const avgApps = students.length > 0
            ? (students.reduce((sum, s) => sum + (s.applications_count ?? 0), 0) / students.length).toFixed(1)
            : '0';
        return { totalStudents, totalFound, totalSearching, avgApps };
    }, [stats, students]);

    if (loading) {
        return (
            <section>
                <h1 className="page-title">Tableau de bord</h1>
                <Spinner />
            </section>
        );
    }

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Tableau de bord</h1>
                <p className="page-subtitle">Vue d'ensemble de vos promotions</p>
            </div>

            <div className="stats-row">
                <div className="stat-card">
                    <div className="stat-number">{totals.totalStudents}</div>
                    <div className="stat-label">Etudiants inscrits</div>
                </div>
                <div className="stat-card green">
                    <div className="stat-number">{totals.totalFound}</div>
                    <div className="stat-label">Stages trouves</div>
                </div>
                <div className="stat-card orange">
                    <div className="stat-number">{totals.totalSearching}</div>
                    <div className="stat-label">En recherche</div>
                </div>
                <div className="stat-card">
                    <div className="stat-number">{totals.avgApps}</div>
                    <div className="stat-label">Moy. candidatures</div>
                </div>
            </div>

            {stats.length > 0 && (
                <div className="card">
                    <h3 className="card-title">Taux de placement par ecole</h3>
                    <p className="card-subtitle">Pourcentage d'etudiants ayant trouve un stage</p>
                    <div className="bar-chart" style={{ marginTop: 16 }}>
                        {stats.map((s, i) => {
                            const pct = s.total > 0 ? Math.round((s.found / s.total) * 100) : 0;
                            return (
                                <div className="bar-chart-row" key={s.school_id || i}>
                                    <div className="bar-chart-label" title={sanitizeText(s.school_name || s.name || 'Ecole')}>
                                        {sanitizeText(s.school_name || s.name || 'Ecole')}
                                    </div>
                                    <div className="bar-chart-track" role="progressbar" aria-valuenow={pct} aria-valuemin={0} aria-valuemax={100}>
                                        <div className="bar-chart-fill" style={{ width: `${Math.max(pct, 5)}%` }}>
                                            {pct}%
                                        </div>
                                    </div>
                                    <span style={{ fontSize: 12, color: 'var(--color-text-muted)', minWidth: 60, textAlign: 'right' }}>
                                        {s.found}/{s.total}
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}

            <div className="quick-actions mt-24">
                <button className="quick-action-link" onClick={() => setPage('students')}>
                    Voir le suivi <Icon.ArrowRight />
                </button>
                <button className="quick-action-link" onClick={() => setPage('messages')}>
                    Messagerie <Icon.ArrowRight />
                </button>
                {totals.totalStudents === 0 && (
                    <button className="quick-action-link" style={{color:'#D4742C'}} onClick={async () => {
                        if (!window.confirm('Generer ~150 etudiants fictifs pour la demo ?')) return;
                        try {
                            const r = await fetch('/api/admin/seed-fake-data', {method:'POST', headers:{'Authorization':'Bearer '+getToken()}});
                            const d = await r.json();
                            alert(d.message || d.detail);
                            window.location.reload();
                        } catch(e) { alert('Erreur: '+e.message); }
                    }}>
                        Generer des donnees demo <Icon.ArrowRight />
                    </button>
                )}
            </div>
        </section>
    );
}

/* ===== Admin: Suivi Etudiants (Spreadsheet) ===== */

function AdminStudents({ toast, setPage, setChatStudentId }) {
    const [schools, setSchools] = useState([]);
    const [activeSchool, setActiveSchool] = useState(null);
    const [students, setStudents] = useState([]);
    const [loading, setLoading] = useState(true);
    const [editingCell, setEditingCell] = useState(null);
    const [editValue, setEditValue] = useState('');
    const [showAddSchool, setShowAddSchool] = useState(false);
    const [newSchoolName, setNewSchoolName] = useState('');
    const [renamingTab, setRenamingTab] = useState(null);
    const [renameValue, setRenameValue] = useState('');
    const [stageFilter, setStageFilter] = useState('all'); // 'all', 'found', 'searching'
    const [importing, setImporting] = useState(false);
    // Multi-column sort: array of { key, dir } — first = primary, second = secondary, etc.
    const [sortStack, setSortStack] = useState([{ key: 'promo', dir: 'asc' }, { key: 'first_name', dir: 'asc' }]);
    const csvInputRef = React.useRef(null);

    const handleSort = useCallback((key) => {
        setSortStack((prev) => {
            const existingIdx = prev.findIndex((s) => s.key === key);
            if (existingIdx === 0) {
                // Already primary: toggle direction
                const copy = [...prev];
                copy[0] = { key, dir: copy[0].dir === 'asc' ? 'desc' : 'asc' };
                return copy;
            } else {
                // New primary: remove from old position if exists, push old primary down
                const filtered = prev.filter((s) => s.key !== key);
                return [{ key, dir: 'asc' }, ...filtered].slice(0, 3); // max 3 levels
            }
        });
    }, []);

    const fetchSchools = useCallback(async () => {
        try {
            const d = await api('/api/schools');
            const list = Array.isArray(d) ? d : d.schools || [];
            setSchools(list);
            if (list.length > 0 && !activeSchool) setActiveSchool(list[0].id);
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [toast, activeSchool]);

    const fetchStudents = useCallback(async (schoolId) => {
        if (!schoolId) { setStudents([]); setLoading(false); return; }
        setLoading(true);
        try {
            const d = await api(`/api/admin/students?school_id=${schoolId}`);
            setStudents(Array.isArray(d) ? d : d.students || []);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setLoading(false);
        }
    }, [toast]);

    useEffect(() => { fetchSchools(); }, []);
    useEffect(() => { if (activeSchool) fetchStudents(activeSchool); }, [activeSchool, fetchStudents]);

    const startEdit = useCallback((rowId, field, currentValue) => {
        setEditingCell({ rowId, field });
        setEditValue(currentValue || '');
    }, []);

    const cancelEdit = useCallback(() => {
        setEditingCell(null);
        setEditValue('');
    }, []);

    const saveEdit = useCallback(async (rowId, field) => {
        const payload = {};
        if (field === 'stage_status') {
            payload.stage_status = editValue === 'Oui' ? 'found' : 'searching';
        } else {
            payload[field] = editValue;
        }
        try {
            await api(`/api/admin/students/${rowId}`, { method: 'PATCH', body: JSON.stringify(payload) });
            setStudents((prev) => prev.map((s) => {
                if (s.id !== rowId) return s;
                if (field === 'stage_status') return { ...s, stage_status: payload.stage_status };
                return { ...s, [field]: editValue };
            }));
        } catch (err) {
            toast(err.message, 'error');
        }
        setEditingCell(null);
        setEditValue('');
    }, [editValue, toast]);

    const handleCellKeyDown = useCallback((e, rowId, field) => {
        if (e.key === 'Enter') saveEdit(rowId, field);
        if (e.key === 'Escape') cancelEdit();
    }, [saveEdit, cancelEdit]);

    const addSchool = useCallback(async () => {
        if (!newSchoolName.trim()) return;
        try {
            await api('/api/admin/schools', { method: 'POST', body: JSON.stringify({ name: newSchoolName }) });
            toast('Ecole ajoutee');
            setNewSchoolName('');
            setShowAddSchool(false);
            fetchSchools();
        } catch (err) {
            toast(err.message, 'error');
        }
    }, [newSchoolName, toast, fetchSchools]);

    const handleTabDoubleClick = useCallback((school) => {
        setRenamingTab(school.id);
        setRenameValue(school.name || school.nom || '');
    }, []);

    const saveRename = useCallback(async (schoolId) => {
        if (!renameValue.trim()) { setRenamingTab(null); return; }
        try {
            await api(`/api/admin/schools/${schoolId}`, { method: 'PATCH', body: JSON.stringify({ name: renameValue }) });
            setSchools((prev) => prev.map((s) => s.id === schoolId ? { ...s, name: renameValue, nom: renameValue } : s));
        } catch (err) {
            toast(err.message, 'error');
        }
        setRenamingTab(null);
    }, [renameValue, toast]);

    const openChatPage = useCallback((student) => {
        setChatStudentId(student.id);
        setPage('messages');
    }, [setChatStudentId, setPage]);

    const handleCsvImport = useCallback(async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setImporting(true);
        try {
            const formData = new FormData();
            formData.append('file', file);
            const url = activeSchool ? `/api/admin/import-csv?school_id=${activeSchool}` : '/api/admin/import-csv';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${getToken()}` },
                body: formData,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Erreur import');
            toast(`${data.created} etudiant(s) importe(s), ${data.skipped} ignore(s)`);
            if (activeSchool) fetchStudents(activeSchool);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setImporting(false);
            if (csvInputRef.current) csvInputRef.current.value = '';
        }
    }, [activeSchool, toast, fetchStudents]);

    const getSortVal = useCallback((student, key) => {
        switch (key) {
            case 'last_name': return (student.last_name || student.nom || '').toLowerCase();
            case 'first_name': return (student.first_name || student.prenom || '').toLowerCase();
            case 'promo': return (student.promo || '').toLowerCase();
            case 'sector': return (student.sector || student.secteur || '').toLowerCase();
            case 'stage_status': return student.stage_status === 'found' ? 'a' : 'z';
            case 'applications_count': return student.applications_count ?? 0;
            case 'saved_jobs_count': return student.saved_jobs_count ?? 0;
            default: return '';
        }
    }, []);

    const filteredStudents = useMemo(() => {
        let list = students;
        if (stageFilter === 'found') list = students.filter((s) => s.stage_status === 'found');
        else if (stageFilter === 'searching') list = students.filter((s) => s.stage_status !== 'found');

        const sorted = [...list].sort((a, b) => {
            for (const { key, dir } of sortStack) {
                const valA = getSortVal(a, key);
                const valB = getSortVal(b, key);
                if (typeof valA === 'number' && typeof valB === 'number') {
                    const diff = dir === 'asc' ? valA - valB : valB - valA;
                    if (diff !== 0) return diff;
                } else {
                    if (valA < valB) return dir === 'asc' ? -1 : 1;
                    if (valA > valB) return dir === 'asc' ? 1 : -1;
                }
            }
            return 0;
        });
        return sorted;
    }, [students, stageFilter, sortStack, getSortVal]);

    const renderCell = (student, field, displayValue) => {
        const isEditing = editingCell?.rowId === student.id && editingCell?.field === field;

        if (field === 'stage_status') {
            const val = student.stage_status === 'found' ? 'Oui' : 'Non';
            if (isEditing) {
                return (
                    <td className="editing">
                        <select value={editValue} onChange={(e) => setEditValue(e.target.value)} onBlur={() => saveEdit(student.id, field)} onKeyDown={(e) => handleCellKeyDown(e, student.id, field)} autoFocus aria-label="Statut stage">
                            <option value="Oui">Oui</option>
                            <option value="Non">Non</option>
                        </select>
                    </td>
                );
            }
            return (
                <td onDoubleClick={() => startEdit(student.id, field, val)} style={{ cursor: 'pointer' }} title="Double-cliquer pour modifier">
                    <span className={`tracking-status ${student.stage_status === 'found' ? 'accepte' : 'relance'}`}>
                        {val}
                    </span>
                </td>
            );
        }

        if (isEditing) {
            return (
                <td className="editing">
                    <input value={editValue} onChange={(e) => setEditValue(e.target.value)} onBlur={() => saveEdit(student.id, field)} onKeyDown={(e) => handleCellKeyDown(e, student.id, field)} autoFocus maxLength={200} aria-label={field} />
                </td>
            );
        }

        return (
            <td onDoubleClick={() => startEdit(student.id, field, displayValue)} style={{ cursor: 'pointer' }} title="Double-cliquer pour modifier">
                {sanitizeText(displayValue) || <span style={{ color: 'var(--color-text-faint)' }}>-</span>}
            </td>
        );
    };

    const schoolStats = useMemo(() => ({
        total: students.length,
        found: students.filter((s) => s.stage_status === 'found').length,
        searching: students.filter((s) => s.stage_status !== 'found').length,
    }), [students]);

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Suivi des etudiants</h1>
                <p className="page-subtitle">Gerez et suivez l'avancement de vos promotions</p>
            </div>

            {!loading && (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20, flexWrap: 'wrap', gap: 12 }}>
                    <div className="flex-center" style={{ gap: 8 }}>
                        <button className={`filter-pill${stageFilter === 'all' ? ' active' : ''}`} onClick={() => setStageFilter('all')}>
                            Tous <span className="filter-count">{schoolStats.total}</span>
                        </button>
                        <button className={`filter-pill green${stageFilter === 'found' ? ' active' : ''}`} onClick={() => setStageFilter('found')}>
                            Stage obtenu <span className="filter-count">{schoolStats.found}</span>
                        </button>
                        <button className={`filter-pill orange${stageFilter === 'searching' ? ' active' : ''}`} onClick={() => setStageFilter('searching')}>
                            En recherche <span className="filter-count">{schoolStats.searching}</span>
                        </button>
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                        <input type="file" accept=".csv" ref={csvInputRef} onChange={handleCsvImport} style={{ display: 'none' }} />
                        <button className="btn btn-outline btn-sm" onClick={() => csvInputRef.current?.click()} disabled={importing} title="Importer des etudiants depuis un fichier CSV">
                            {importing ? 'Import...' : '⬆ Importer CSV'}
                        </button>
                    </div>
                </div>
            )}

            <div className="tabs" style={{ marginBottom: 0 }} role="tablist" aria-label="Ecoles">
                {schools.map((s) => (
                    renamingTab === s.id ? (
                        <div key={s.id} style={{ display: 'inline-flex', alignItems: 'center', padding: '4px 8px', marginBottom: -1 }}>
                            <input
                                className="input"
                                style={{ padding: '4px 8px', fontSize: 13, width: 120 }}
                                value={renameValue}
                                onChange={(e) => setRenameValue(e.target.value)}
                                onBlur={() => saveRename(s.id)}
                                onKeyDown={(e) => { if (e.key === 'Enter') saveRename(s.id); if (e.key === 'Escape') setRenamingTab(null); }}
                                autoFocus
                                maxLength={100}
                                aria-label="Renommer l'ecole"
                            />
                        </div>
                    ) : (
                        <button
                            key={s.id}
                            className={`tab${activeSchool === s.id ? ' active' : ''}`}
                            role="tab"
                            aria-selected={activeSchool === s.id}
                            onClick={() => setActiveSchool(s.id)}
                            onDoubleClick={() => handleTabDoubleClick(s)}
                            title="Double-cliquer pour renommer"
                        >
                            {sanitizeText(s.name || s.nom)}
                        </button>
                    )
                ))}
                {showAddSchool ? (
                    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 8px', marginBottom: -1 }}>
                        <input
                            className="input"
                            style={{ padding: '4px 8px', fontSize: 13, width: 120 }}
                            value={newSchoolName}
                            onChange={(e) => setNewSchoolName(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') addSchool(); if (e.key === 'Escape') setShowAddSchool(false); }}
                            placeholder="Nom de l'ecole"
                            autoFocus
                            maxLength={100}
                            aria-label="Nom de la nouvelle ecole"
                        />
                        <button className="btn btn-primary btn-sm" style={{ padding: '4px 8px' }} onClick={addSchool}>OK</button>
                    </div>
                ) : (
                    <button className="tab-add" onClick={() => setShowAddSchool(true)} title="Ajouter une ecole" aria-label="Ajouter une ecole">+</button>
                )}
            </div>

            {loading ? <Spinner /> : (
                <div className="spreadsheet-container" style={{ marginTop: 0 }}>
                    <table className="spreadsheet">
                        <thead>
                            <tr>
                                {[
                                    { key: 'last_name', label: 'Nom' },
                                    { key: 'first_name', label: 'Prenom' },
                                    { key: 'promo', label: 'Promotion' },
                                    { key: null, label: 'CV' },
                                    { key: 'target_sector', label: 'Secteur' },
                                    { key: 'stage_status', label: 'Stage obtenu' },
                                    { key: null, label: 'Entreprise' },
                                    { key: 'saved_jobs_count', label: 'Offres sauveg.' },
                                    { key: 'applications_count', label: 'Candidatures' },
                                    { key: null, label: 'Notes' },
                                    { key: null, label: 'Chat' },
                                    { key: null, label: 'Actions' },
                                ].map(({ key, label }) => {
                                    if (!key) return <th key={label}>{label}</th>;
                                    const idx = sortStack.findIndex((s) => s.key === key);
                                    const isActive = idx !== -1;
                                    const dir = isActive ? sortStack[idx].dir : null;
                                    return (
                                        <th key={key} className="sortable" onClick={() => handleSort(key)}>
                                            {label}
                                            {isActive ? (
                                                <span className="sort-indicator active">
                                                    {dir === 'asc' ? ' ↑' : ' ↓'}
                                                    {idx > 0 && <span className="sort-rank">{idx + 1}</span>}
                                                </span>
                                            ) : <span className="sort-indicator"> ↕</span>}
                                        </th>
                                    );
                                })}
                            </tr>
                        </thead>
                        <tbody>
                            {filteredStudents.length > 0 ? filteredStudents.map((s) => (
                                <tr key={s.id}>
                                    {renderCell(s, 'last_name', s.last_name || s.nom || '')}
                                    {renderCell(s, 'first_name', s.first_name || s.prenom || '')}
                                    {renderCell(s, 'promo', s.promo || '')}
                                    <td>
                                        {s.has_cv ? (
                                            <a href={`/api/admin/students/${s.id}/cv`} target="_blank" rel="noopener noreferrer" className="btn btn-outline btn-sm" style={{ padding: '3px 10px', fontSize: 12 }} aria-label="Voir le CV">
                                                Voir
                                            </a>
                                        ) : <span style={{ color: 'var(--color-text-faint)' }}>--</span>}
                                    </td>
                                    {renderCell(s, 'target_sector', s.target_sector || s.sector || '')}
                                    {renderCell(s, 'stage_status', '')}
                                    {renderCell(s, 'company', s.company || s.entreprise || '')}
                                    <td style={{ textAlign: 'center', color: 'var(--color-text-muted)' }}>{s.saved_jobs_count ?? 0}</td>
                                    <td style={{ textAlign: 'center', color: 'var(--color-text-muted)' }}>{s.applications_count ?? 0}</td>
                                    {renderCell(s, 'notes', s.notes || '')}
                                    <td style={{ textAlign: 'center' }}>
                                        <button className="btn btn-outline btn-sm" style={{ padding: '4px 8px' }} onClick={() => openChatPage(s)} title="Ouvrir la messagerie" aria-label={`Messagerie avec ${sanitizeText(s.first_name || '')} ${sanitizeText(s.last_name || '')}`}>
                                            Ouvrir
                                        </button>
                                    </td>
                                    <td style={{ textAlign: 'center' }}>
                                        <button className="btn btn-outline btn-sm" style={{ padding: '3px 8px', fontSize: 11, color: '#D4742C', borderColor: '#D4742C' }} onClick={async () => {
                                            if (!window.confirm(`Reinitialiser le mot de passe de ${s.first_name} ${s.last_name} ?`)) return;
                                            try {
                                                const r = await fetch(`/api/admin/students/${s.id}/reset-password`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
                                                const d = await r.json();
                                                if (r.ok) {
                                                    window.prompt(`Nouveau mot de passe temporaire pour ${s.first_name} ${s.last_name} :\n(Copiez-le et transmettez-le a l'etudiant)`, d.temp_password);
                                                } else { alert(d.detail || 'Erreur'); }
                                            } catch(e) { alert('Erreur: ' + e.message); }
                                        }} title="Reinitialiser le mot de passe">
                                            Reset MDP
                                        </button>
                                    </td>
                                </tr>
                            )) : (
                                <tr>
                                    <td colSpan={11} style={{ textAlign: 'center', color: 'var(--color-text-muted)', padding: 48 }}>
                                        {stageFilter !== 'all' ? 'Aucun etudiant ne correspond a ce filtre.' : 'Aucun etudiant inscrit dans cette ecole pour le moment.'}
                                    </td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            )}
        </section>
    );
}

/* ===== Admin: Messages ===== */

function AdminMessages({ toast, initialStudentId }) {
    const [students, setStudents] = useState([]);
    const [selectedId, setSelectedId] = useState(initialStudentId || null);
    const [messages, setMessages] = useState([]);
    const [loadingStudents, setLoadingStudents] = useState(true);
    const [loadingMessages, setLoadingMessages] = useState(false);
    const [text, setText] = useState('');
    const [sending, setSending] = useState(false);
    const chatBodyRef = useRef(null);

    useEffect(() => {
        api('/api/admin/students')
            .then((d) => {
                const list = Array.isArray(d) ? d : d.students || [];
                setStudents(list);
                if (!selectedId && list.length > 0) setSelectedId(list[0].id);
            })
            .catch((err) => toast(err.message, 'error'))
            .finally(() => setLoadingStudents(false));
    }, []);

    const fetchMessages = useCallback((sid) => {
        if (!sid) return;
        setLoadingMessages(true);
        api(`/api/admin/messages/${sid}`)
            .then((d) => setMessages(Array.isArray(d) ? d : d.messages || []))
            .catch((err) => toast(err.message, 'error'))
            .finally(() => setLoadingMessages(false));
    }, [toast]);

    useEffect(() => { if (selectedId) fetchMessages(selectedId); }, [selectedId, fetchMessages]);

    useEffect(() => {
        if (chatBodyRef.current) {
            chatBodyRef.current.scrollTop = chatBodyRef.current.scrollHeight;
        }
    }, [messages]);

    const sendMessage = useCallback(async () => {
        if (!text.trim() || !selectedId) return;
        setSending(true);
        try {
            await api('/api/admin/messages', {
                method: 'POST',
                body: JSON.stringify({ to_student_id: selectedId, content: text }),
            });
            setText('');
            fetchMessages(selectedId);
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            setSending(false);
        }
    }, [text, selectedId, toast, fetchMessages]);

    const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }, [sendMessage]);

    const selectedStudent = useMemo(
        () => students.find((s) => s.id === selectedId),
        [students, selectedId]
    );

    return (
        <section className="fade-in">
            <div className="page-title-group">
                <h1 className="page-title">Messagerie</h1>
                <p className="page-subtitle">Communiquez avec vos etudiants</p>
            </div>
            <div className="messaging-layout">
                <nav className="msg-contacts" aria-label="Liste des etudiants">
                    {loadingStudents ? <Spinner /> : (
                        students.map((s) => (
                            <div
                                key={s.id}
                                className={`msg-contact${selectedId === s.id ? ' active' : ''}`}
                                role="button"
                                tabIndex={0}
                                onClick={() => setSelectedId(s.id)}
                                onKeyDown={(e) => e.key === 'Enter' && setSelectedId(s.id)}
                                aria-label={`${sanitizeText(s.first_name || '')} ${sanitizeText(s.last_name || '')}`}
                            >
                                <div className="msg-contact-avatar" aria-hidden="true">
                                    {(s.first_name || '?')[0]}{(s.last_name || '?')[0]}
                                </div>
                                <div className="msg-contact-info">
                                    <div className="msg-contact-name">{sanitizeText(s.first_name || '')} {sanitizeText(s.last_name || '')}</div>
                                    <div className="msg-contact-preview">{sanitizeText(s.email || '')}</div>
                                </div>
                            </div>
                        ))
                    )}
                </nav>
                <div className="msg-chat">
                    {selectedStudent ? (
                        <>
                            <div className="msg-chat-header">{sanitizeText(selectedStudent.first_name || '')} {sanitizeText(selectedStudent.last_name || '')}</div>
                            <div className="msg-chat-body" ref={chatBodyRef}>
                                {loadingMessages ? <Spinner /> : (
                                    messages.length > 0 ? messages.map((m, i) => (
                                        <div key={m.id || i} className={`msg-bubble ${m.from_admin ? 'sent' : 'received'}`}>
                                            <div>{sanitizeText(m.content || m.message || m.text)}</div>
                                            <div className="msg-bubble-time">{relativeTime(m.sent_at || m.created_at || m.date)}</div>
                                        </div>
                                    )) : <div className="msg-empty">Aucun message. Envoyez le premier message a cet etudiant.</div>
                                )}
                            </div>
                            <div className="msg-input-area">
                                <input
                                    className="input"
                                    type="text"
                                    value={text}
                                    onChange={(e) => setText(e.target.value)}
                                    placeholder="Ecrire un message..."
                                    onKeyDown={handleKeyDown}
                                    maxLength={2000}
                                    aria-label="Message"
                                />
                                <button className="btn btn-primary btn-sm" onClick={sendMessage} disabled={sending || !text.trim()}>
                                    {sending ? '...' : 'Envoyer'}
                                </button>
                            </div>
                        </>
                    ) : (
                        <div className="msg-empty">Selectionnez un etudiant pour demarrer la conversation.</div>
                    )}
                </div>
            </div>
        </section>
    );
}

/* ===== Main App ===== */

function App() {
    const [user, setUser] = useState(getUserData);
    const [toasts, setToasts] = useState([]);
    const [page, setPage] = useState('dashboard');
    const [sidebarOpen, setSidebarOpen] = useState(false);
    const [unreadCount, setUnreadCount] = useState(0);
    const [chatStudentId, setChatStudentId] = useState(null);

    const toast = useCallback((msg, type = 'success') => {
        const id = Date.now();
        setToasts((prev) => [...prev, { id, msg, type }]);
        setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3500);
    }, []);

    useEffect(() => {
        if (!user || user.role === 'admin') return;
        const fetchUnread = () => {
            api('/api/student/messages/unread-count')
                .then((d) => setUnreadCount(typeof d === 'number' ? d : d.count || 0))
                .catch(() => {});
        };
        fetchUnread();
        const interval = setInterval(fetchUnread, 30000);
        return () => clearInterval(interval);
    }, [user]);

    const handleLogin = useCallback((userData) => {
        setUser(userData);
        setPage('dashboard');
    }, []);

    const handleLogout = useCallback(() => {
        clearAuth();
        setUser(null);
        setPage('dashboard');
    }, []);

    const closeSidebar = useCallback(() => setSidebarOpen(false), []);
    const toggleSidebar = useCallback(() => setSidebarOpen((prev) => !prev), []);

    if (!user) {
        return (
            <>
                <ToastContainer toasts={toasts} />
                <LoginPage onLogin={handleLogin} toast={toast} />
            </>
        );
    }

    const isAdmin = user.role === 'admin';

    const studentNav = [
        { id: 'dashboard', label: 'Tableau de bord', icon: <Icon.Dashboard /> },
        { id: 'offres', label: 'Offres de stage', icon: <Icon.Search /> },
        { id: 'suivi', label: 'Mes candidatures', icon: <Icon.ClipboardList /> },
        { id: 'messages', label: 'Messages', icon: <Icon.Message />, badge: unreadCount },
        { id: 'profil', label: 'Mon profil', icon: <Icon.User /> },
    ];
    const adminNav = [
        { id: 'dashboard', label: 'Tableau de bord', icon: <Icon.Dashboard /> },
        { id: 'search', label: 'Recherche de stages', icon: <Icon.Search /> },
        { id: 'students', label: 'Suivi des etudiants', icon: <Icon.Users /> },
        { id: 'messages', label: 'Messagerie', icon: <Icon.Message /> },
    ];
    const navItems = isAdmin ? adminNav : studentNav;

    const renderPage = () => {
        if (isAdmin) {
            switch (page) {
                case 'search': return <AdminSearch toast={toast} />;
                case 'students': return <AdminStudents toast={toast} setPage={setPage} setChatStudentId={setChatStudentId} />;
                case 'messages': return <AdminMessages toast={toast} initialStudentId={chatStudentId} />;
                default: return <AdminDashboard toast={toast} setPage={setPage} />;
            }
        }
        switch (page) {
            case 'offres': return <StudentOffres toast={toast} />;
            case 'suivi': return <StudentSuivi toast={toast} />;
            case 'messages': return <StudentMessages toast={toast} />;
            case 'profil': return <StudentProfil user={user} toast={toast} />;
            default: return <StudentDashboard user={user} toast={toast} />;
        }
    };

    return (
        <div className="app-layout">
            <ToastContainer toasts={toasts} />

            {/* Mobile header */}
            <header className="mobile-header">
                <button className="hamburger" onClick={toggleSidebar} aria-label="Ouvrir le menu" aria-expanded={sidebarOpen}>
                    <Icon.Menu />
                </button>
                <h1>ICART</h1>
                <div style={{ width: 40 }} aria-hidden="true"></div>
            </header>
            <div className={`sidebar-overlay${sidebarOpen ? ' open' : ''}`} onClick={closeSidebar} aria-hidden="true"></div>

            {/* Sidebar */}
            <aside className={`sidebar${sidebarOpen ? ' open' : ''}`} aria-label="Navigation principale">
                <div className="sidebar-logo">
                    <h1>ICART</h1>
                    <span>{isAdmin ? 'Relations Entreprises' : 'Espace Etudiant'}</span>
                </div>
                <nav className="sidebar-nav" aria-label="Menu principal">
                    {navItems.map((item) => (
                        <button
                            key={item.id}
                            className={`nav-item${page === item.id ? ' active' : ''}`}
                            onClick={() => { setPage(item.id); closeSidebar(); }}
                            aria-current={page === item.id ? 'page' : undefined}
                        >
                            {item.icon}
                            <span style={{ flex: 1 }}>{item.label}</span>
                            {item.badge > 0 && (
                                <span className="nav-badge" aria-label={`${item.badge} non lus`}>{item.badge}</span>
                            )}
                        </button>
                    ))}
                </nav>
                <div className="sidebar-footer">
                    <button onClick={handleLogout} className="logout-link" aria-label="Se deconnecter">
                        <Icon.Logout /> Se deconnecter
                    </button>
                    <span className="user-email" title={user.email}>{sanitizeText(user.email)}</span>
                </div>
            </aside>

            {/* Main content */}
            <main className="main-content">
                {renderPage()}
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
