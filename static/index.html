/* ---- HUMAN (People Search) ---- */
function HumanPage({ toast }) {
  const [kw1, setKw1] = useState('');
  const [kw2, setKw2] = useState('');
  const [kw3, setKw3] = useState('');
  const [location, setLocation] = useState('');
  const [loading, setLoading] = useState(false);
  const [people, setPeople] = useState([]);
  const [searched, setSearched] = useState(false);
  const [history, setHistory] = useState([]);
  const [historyLoading, setHistoryLoading] = useState(true);
  const [msgPerson, setMsgPerson] = useState(null);
  const [msgContext, setMsgContext] = useState('');
  const [msgLoading, setMsgLoading] = useState(false);
  const [messages, setMessages] = useState(null);

  const loadHistory = async () => {
    try {
      const data = await api('/api/search/people/history');
      setHistory(data.history || []);
    } catch(e) { /* ignore */ }
    setHistoryLoading(false);
  };

  React.useEffect(() => { loadHistory(); }, []);

  const search = async () => {
    const keywords = [kw1, kw2, kw3].filter(k => k.trim());
    if (!keywords.length) { toast(t('enterKeywords'), 'error'); return; }
    setLoading(true); setSearched(true);
    try {
      const data = await api('/api/search/people', { method: 'POST', body: JSON.stringify({ keywords, location }) });
      setPeople(data.people || []);
      loadHistory();
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  const loadFromHistory = (entry) => {
    setPeople(entry.results || []);
    setSearched(true);
    const kws = entry.keywords || [];
    setKw1(kws[0] || ''); setKw2(kws[1] || ''); setKw3(kws[2] || '');
    setLocation(entry.location || '');
  };

  const deleteHistory = async (id, e) => {
    e.stopPropagation();
    try {
      await api(`/api/search/people/history/${id}`, { method: 'DELETE' });
      setHistory(h => h.filter(x => x.id !== id));
      toast('Supprimé ✓');
    } catch(e) { toast(e.message, 'error'); }
  };

  const timeAgo = (iso) => {
    if (!iso) return '';
    const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60) return `${diff}s`;
    if (diff < 3600) return `${Math.floor(diff/60)}min`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h`;
    return `${Math.floor(diff/86400)}j`;
  };

  const downloadCsv = () => {
    if (!people.length) return;
    const headers = [t('humanName'), t('humanTitle'), t('humanCompany'), t('humanLocationCol'), t('humanLinkedin')];
    const rows = people.map(p => [
      p.name, p.title, p.company, p.location, p.linkedin_url
    ].map(v => `"${(v || '').replace(/"/g, '""')}"`));
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `linkedin_${[kw1,kw2,kw3].filter(k=>k.trim()).join('_').replace(/\s+/g, '_')}_${location || 'all'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast(t('humanDownloadCsv') + ' ✓');
  };

  return (
    <div>
      <h1 className="page-title">{t('humanSearch')}</h1>
      <div className="card">
        <p className="card-subtitle" style={{marginBottom:16}}>{t('humanSubtitle')}</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <label className="input-label">{t('humanKeywords')} 1 *</label>
            <input className="input" value={kw1} onChange={e=>setKw1(e.target.value)} placeholder={t('humanKeywordsPlaceholder')} onKeyDown={e => e.key==='Enter' && search()} />
          </div>
          <div>
            <label className="input-label">{t('humanKeywords')} 2</label>
            <input className="input" value={kw2} onChange={e=>setKw2(e.target.value)} placeholder="ex: directeur" onKeyDown={e => e.key==='Enter' && search()} />
          </div>
          <div>
            <label className="input-label">{t('humanKeywords')} 3</label>
            <input className="input" value={kw3} onChange={e=>setKw3(e.target.value)} placeholder="ex: marketing" onKeyDown={e => e.key==='Enter' && search()} />
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label className="input-label">{t('humanLocation')}</label>
          <input className="input" value={location} onChange={e=>setLocation(e.target.value)} placeholder={t('humanLocationPlaceholder')} onKeyDown={e => e.key==='Enter' && search()} style={{maxWidth:300}} />
        </div>
        <button className="btn btn-primary" onClick={search} disabled={loading}>{loading ? t('humanSearching') : t('humanSearchBtn')}</button>
      </div>

      {/* History */}
      {history.length > 0 && !loading && (
        <div className="card" style={{marginTop:16}}>
          <h3 style={{fontSize:15,marginBottom:12}}>{t('humanHistory')}</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {history.map(h => (
              <div key={h.id} onClick={() => loadFromHistory(h)} style={{
                display:'flex',justifyContent:'space-between',alignItems:'center',
                padding:'10px 14px',borderRadius:8,background:'var(--bg-secondary)',
                cursor:'pointer',transition:'background .15s',border:'1px solid var(--border)',
              }} onMouseEnter={e=>e.currentTarget.style.background='var(--bg-tertiary)'}
                 onMouseLeave={e=>e.currentTarget.style.background='var(--bg-secondary)'}>
                <div style={{flex:1}}>
                  <span style={{fontWeight:600,fontSize:14}}>{h.keywords.join(' + ')}</span>
                  {h.location && <span style={{color:'var(--text-secondary)',marginLeft:8,fontSize:13}}>{h.location}</span>}
                  <span style={{color:'var(--text-secondary)',marginLeft:8,fontSize:12}}>{h.result_count} {t('humanResultsCount')}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{color:'var(--text-secondary)',fontSize:12}}>{timeAgo(h.created_at)}</span>
                  <button onClick={(e) => deleteHistory(h.id, e)} className="btn btn-outline" style={{
                    fontSize:11,padding:'3px 8px',color:'var(--danger)',borderColor:'var(--danger)',
                  }}>&times;</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {loading && <div><div className="spinner"/><div className="loading-text">{t('humanSearching')}</div></div>}
      {searched && !loading && people.length > 0 && (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
            <h3 style={{fontSize:15}}>{people.length} {t('humanResultsCount')}</h3>
            <button className="btn btn-outline" onClick={downloadCsv} style={{fontSize:12,padding:'6px 14px',gap:6}}>
              <Icon.Download /> {t('humanDownloadCsv')}
            </button>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="people-table">
              <thead>
                <tr>
                  <th>{t('humanName')}</th>
                  <th>{t('humanTitle')}</th>
                  <th>{t('humanCompany')}</th>
                  <th>{t('humanLocationCol')}</th>
                  <th>{t('humanLinkedin')}</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {people.map((p, i) => (
                  <React.Fragment key={i}>
                    <tr>
                      <td><span className="people-name">{p.name}</span></td>
                      <td><span className="people-title">{p.title}</span></td>
                      <td>{p.company}</td>
                      <td>{p.location}</td>
                      <td><a href={p.linkedin_url} target="_blank" rel="noopener noreferrer">{t('humanView')}</a></td>
                      <td>
                        <button className="btn btn-outline" style={{fontSize:11,padding:'4px 10px'}} onClick={() => { setMsgPerson(msgPerson === i ? null : i); setMessages(null); }}>
                          {t('generateMessage')}
                        </button>
                      </td>
                    </tr>
                    {msgPerson === i && (
                      <tr><td colSpan="6" style={{padding:'12px 16px',background:'var(--main-bg)'}}>
                        <div style={{marginBottom:12}}>
                          <label className="input-label">{t('messageContext')}</label>
                          <input className="input" value={msgContext} onChange={e => setMsgContext(e.target.value)} placeholder={t('messageContextPlaceholder')} style={{maxWidth:400}} />
                        </div>
                        <button className="btn btn-primary" style={{fontSize:12,marginBottom:12}} disabled={msgLoading} onClick={async () => {
                          setMsgLoading(true);
                          try {
                            const data = await api('/api/networking/messages', { method: 'POST', body: JSON.stringify({ person: p, context: msgContext }) });
                            setMessages(data.messages || { formal: data.formal || '', casual: data.casual || '', direct: data.direct || '' });
                          } catch(e) { toast(e.message, 'error'); }
                          setMsgLoading(false);
                        }}>{msgLoading ? t('generatingMessages') : t('generateMessage')}</button>
                        {messages && (
                          <div className="msg-options">
                            {[['formal', t('messageFormal')], ['casual', t('messageCasual')], ['direct', t('messageDirect')]].map(([key, label]) => (
                              <div key={key} className="msg-option">
                                <div className="msg-option-label">{label}</div>
                                <div className="msg-option-text">{messages[key]}</div>
                                <button className="btn btn-outline copy-btn" style={{fontSize:11,padding:'3px 8px'}} onClick={() => { navigator.clipboard.writeText(messages[key]); toast(t('messageCopied')); }}>{t('copyMessage')}</button>
                              </div>
                            ))}
                          </div>
                        )}
                      </td></tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {searched && !loading && people.length === 0 && (
        <div className="card" style={{textAlign:'center',color:'var(--text-secondary)'}}>{t('humanNoResults')}</div>
      )}
    </div>
  );
}

/* ---- ALERTS PAGE ---- */
function AlertsPage({ toast, setPage }) {
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [unseenCount, setUnseenCount] = useState(0);

  useEffect(() => {
    (async () => {
      try {
        const data = await api('/api/alerts');
        setAlerts(data.alerts || []);
        setUnseenCount(data.unseen_count || 0);
      } catch(e) { toast(e.message, 'error'); }
      setLoading(false);
    })();
  }, []);

  const markSeen = async (id) => {
    try {
      await api(`/api/alerts/seen/${id}`, { method: 'POST' });
      setAlerts(prev => prev.map(a => a.id === id ? { ...a, seen: true } : a));
      setUnseenCount(prev => Math.max(0, prev - 1));
    } catch(e) { toast(e.message, 'error'); }
  };

  const scoreClass = (s) => s >= 7 ? 'score-high' : s >= 4 ? 'score-mid' : 'score-low';

  return (
    <div>
      <h1 className="page-title">{t('alertsTitle')}</h1>
      {loading && <div><div className="spinner"/><div className="loading-text">{t('loading')}</div></div>}
      {!loading && alerts.length === 0 && (
        <div className="card" style={{textAlign:'center',color:'var(--text-secondary)'}}>{t('alertsEmpty')}</div>
      )}
      {!loading && alerts.map(alert => (
        <div key={alert.id} className="job-card" style={{opacity: alert.seen ? 0.7 : 1, borderLeft: !alert.seen ? '3px solid var(--accent)' : '3px solid transparent'}}
          onClick={() => { if (!alert.seen) markSeen(alert.id); }}>
          <div className={`score-badge ${scoreClass(alert.score)}`}>{Math.round(alert.score)}</div>
          <div className="job-info">
            <div className="job-title">{alert.job_title}</div>
            <div className="job-meta"><span>{alert.company}</span></div>
            {alert.explanation && <div className="job-explanation">{alert.explanation}</div>}
          </div>
          <div className="job-actions">
            {alert.url && <a href={alert.url} target="_blank" rel="noopener noreferrer" className="btn btn-outline" style={{fontSize:12,padding:'6px 12px'}}>{t('alertsSeeOffer')}</a>}
            <button className="btn btn-primary" style={{fontSize:12,padding:'6px 12px'}} onClick={(e) => { e.stopPropagation(); setPage('letter'); }}>{t('alertsGenerateLetter')}</button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---- TRACKER PAGE ---- */
function TrackerPage({ toast, setPage }) {
  const [applications, setApplications] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [formTitle, setFormTitle] = useState('');
  const [formCompany, setFormCompany] = useState('');
  const [formUrl, setFormUrl] = useState('');

  const statuses = ['sent', 'followed_up', 'interview', 'rejected', 'waiting'];
  const statusLabels = {
    sent: t('statusSent'), followed_up: t('statusFollowedUp'), interview: t('statusInterview'),
    rejected: t('statusRejected'), waiting: t('statusWaiting')
  };

  const loadApps = async () => {
    try {
      const data = await api('/api/applications');
      setApplications(data || []);
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  useEffect(() => { loadApps(); }, []);

  const addApp = async () => {
    if (!formTitle.trim() || !formCompany.trim()) return;
    try {
      await api('/api/applications', { method: 'POST', body: JSON.stringify({ job_title: formTitle, company: formCompany, url: formUrl, status: 'sent', notes: '' }) });
      toast(t('applicationSaved'));
      setFormTitle(''); setFormCompany(''); setFormUrl(''); setShowForm(false);
      await loadApps();
    } catch(e) { toast(e.message, 'error'); }
  };

  const updateApp = async (id, updates) => {
    try {
      await api(`/api/applications/${id}`, { method: 'PATCH', body: JSON.stringify(updates) });
      setApplications(prev => prev.map(a => a.id === id ? { ...a, ...updates } : a));
    } catch(e) { toast(e.message, 'error'); }
  };

  const deleteApp = async (id) => {
    try {
      await api(`/api/applications/${id}`, { method: 'DELETE' });
      setApplications(prev => prev.filter(a => a.id !== id));
    } catch(e) { toast(e.message, 'error'); }
  };

  const formatDate = (d) => d ? new Date(d).toLocaleDateString('fr-FR') : '';

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h1 className="page-title" style={{marginBottom:0}}>{t('trackerTitle')}</h1>
        <button className="btn btn-primary" onClick={() => setShowForm(!showForm)}>{t('trackerAdd')}</button>
      </div>

      {showForm && (
        <div className="card">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
            <div>
              <label className="input-label">{t('keywords')}</label>
              <input className="input" value={formTitle} onChange={e=>setFormTitle(e.target.value)} placeholder="Job title" />
            </div>
            <div>
              <label className="input-label">{t('humanCompany')}</label>
              <input className="input" value={formCompany} onChange={e=>setFormCompany(e.target.value)} placeholder="Company" />
            </div>
            <div>
              <label className="input-label">URL</label>
              <input className="input" value={formUrl} onChange={e=>setFormUrl(e.target.value)} placeholder="https://..." />
            </div>
          </div>
          <button className="btn btn-primary" onClick={addApp}>{t('trackerAdd')}</button>
        </div>
      )}

      {loading && <div><div className="spinner"/><div className="loading-text">{t('loading')}</div></div>}

      {!loading && applications.length === 0 && !showForm && (
        <div className="card" style={{textAlign:'center',color:'var(--text-secondary)'}}>{t('trackerEmpty')}</div>
      )}

      {!loading && applications.length > 0 && (
        <div className="kanban-board">
          {statuses.map(status => {
            const cards = applications.filter(a => a.status === status);
            return (
              <div key={status} className="kanban-column">
                <div className="kanban-header">
                  <span>{statusLabels[status]}</span>
                  <span className="count-badge">{cards.length}</span>
                </div>
                {cards.map(app => (
                  <div key={app.id} className="kanban-card">
                    <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{app.job_title}</div>
                    <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:6}}>{app.company}</div>
                    <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:8}}>{formatDate(app.applied_at || app.created_at)}</div>
                    <select className="input" style={{fontSize:12,padding:'4px 8px',marginBottom:8}} value={app.status} onChange={e => updateApp(app.id, { status: e.target.value })}>
                      {statuses.map(s => <option key={s} value={s}>{statusLabels[s]}</option>)}
                    </select>
                    <textarea className="textarea" style={{fontSize:12,minHeight:50,marginBottom:8}} placeholder={t('applicationNotes')}
                      defaultValue={app.notes || ''} onBlur={e => { if (e.target.value !== (app.notes || '')) updateApp(app.id, { notes: e.target.value }); }} />
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      {app.url && <a href={app.url} target="_blank" rel="noopener noreferrer" className="btn btn-outline" style={{fontSize:11,padding:'3px 8px'}}>{t('viewOffer')}</a>}
                      <button className="btn btn-outline" style={{fontSize:11,padding:'3px 8px'}} onClick={() => setPage('email')}>{t('sendEmailBtn')}</button>
                      <button className="btn btn-outline" style={{fontSize:11,padding:'3px 8px'}} onClick={() => setPage('email')}>{t('scheduleFollowupBtn')}</button>
                      <button className="btn btn-outline" style={{fontSize:11,padding:'3px 8px',color:'var(--danger)',borderColor:'var(--danger)'}} onClick={() => deleteApp(app.id)}>{t('applicationDelete')}</button>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const tailor = async () => {
    if (!jobDesc.trim() && !jobUrl.trim()) { toast(t('pasteDesc'), 'error'); return; }
    setLoading(true);
    try {
      const data = await api('/api/cv/tailor', { method: 'POST', body: JSON.stringify({ job_url: jobUrl, job_description: jobDesc, job_title: jobTitle, company }) });
      setResult(data);
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);

  const checkAts = async () => {
    setAtsLoading(true);
    try {
      const data = await api('/api/cv/ats-score', { method: 'POST', body: JSON.stringify({ job_description: jobDesc, job_title: jobTitle }) });
      setAtsResult(data);

            <label className="input-label">{t('jobTitleLabel')}</label>

        </div>
        <div style={{marginBottom:16}}>
          <label className="input-label">{t('jobDescription')}</label>
          <textarea className="textarea" style={{minHeight:150}} value={jobDesc} onChange={e => setJobDesc(e.target.value)} placeholder={t('pasteDescription')} />
        </div>
        <div style={{display:'flex',gap:12}}>

      {loading && <div><div className="spinner"/><div className="loading-text">{t('analyzing')}</div></div>}

        <div className="card" style={{textAlign:'center'}}>
          <h3 className="card-title" style={{marginBottom:16}}>{t('atsScoreTitle')}</h3>
          <div className={`ats-circle ${atsColorClass(atsResult.score || 0)}`}>
            {atsResult.score || 0}
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center',marginBottom:16}}>
            {(atsResult.keywords_found || []).map((k,i) => <span key={i} className="badge-green">{k}</span>)}

/* ---- INTERVIEW PAGE ---- */
function InterviewPage({ toast }) {
  const [mode, setMode] = useState('prepare');
  const [jobTitle, setJobTitle] = useState('');
  const [company, setCompany] = useState('');
  const [jobDesc, setJobDesc] = useState('');
  const [loading, setLoading] = useState(false);
  // Prepare mode
  const [questions, setQuestions] = useState([]);
  const [expandedQ, setExpandedQ] = useState(null);
  const [tips, setTips] = useState([]);
  const [salaryRange, setSalaryRange] = useState('');
  // Simulate mode
  const [simMessages, setSimMessages] = useState([]);
  const [simInput, setSimInput] = useState('');
  const [simLoading, setSimLoading] = useState(false);
  const [simQuestion, setSimQuestion] = useState(0);
  const [simTotal, setSimTotal] = useState(10);
  const [simDone, setSimDone] = useState(false);
  const [simSummary, setSimSummary] = useState(null);
  const bottomRef = useRef();

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [simMessages]);

  const generateQuestions = async () => {
    if (!jobTitle.trim()) return;
    setLoading(true);
    try {
      const data = await api('/api/interview/prepare', { method: 'POST', body: JSON.stringify({ job_title: jobTitle, company, job_description: jobDesc }) });
      setQuestions(data.questions || []);
      setTips(data.company_tips || []);
      setSalaryRange(data.salary_range || '');
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  const startSimulation = async () => {
    if (!jobTitle.trim()) return;
    setSimMessages([]);
    setSimQuestion(0);
    setSimDone(false);
    setSimSummary(null);
    setSimLoading(true);
    try {
      const data = await api('/api/interview/simulate', { method: 'POST', body: JSON.stringify({ job_title: jobTitle, company, job_description: jobDesc, action: 'start' }) });
      setSimMessages([{ role: 'ai', text: data.question || data.message }]);
      setSimQuestion(1);
      setSimTotal(data.total_questions || 10);
    } catch(e) { toast(e.message, 'error'); }
    setSimLoading(false);
  };

  const submitAnswer = async () => {
    if (!simInput.trim() || simLoading) return;
    const answer = simInput.trim();
    setSimInput('');
    setSimMessages(m => [...m, { role: 'user', text: answer }]);
    setSimLoading(true);
    try {
      const data = await api('/api/interview/simulate', { method: 'POST', body: JSON.stringify({ job_title: jobTitle, company, action: 'answer', answer, question_number: simQuestion }) });
      if (data.feedback) setSimMessages(m => [...m, { role: 'ai', text: `${data.feedback}${data.score ? ` (${data.score}/10)` : ''}` }]);
      if (data.done) {
        setSimDone(true);
        setSimSummary(data.summary || { average_score: data.average_score, tips: data.tips || [] });
      } else if (data.next_question) {
        setSimMessages(m => [...m, { role: 'ai', text: data.next_question }]);
        setSimQuestion(q => q + 1);
      }
    } catch(e) { toast(e.message, 'error'); }
    setSimLoading(false);
  };

  return (
    <div>
      <h1 className="page-title">{t('interviewTitle')}</h1>
      <div className="card">
        <div className="toggle-row">
          <button className={`toggle-btn ${mode==='prepare'?'active':''}`} onClick={() => setMode('prepare')}>{t('prepareMode')}</button>
          <button className={`toggle-btn ${mode==='simulate'?'active':''}`} onClick={() => setMode('simulate')}>{t('simulateMode')}</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <label className="input-label">{t('jobTitleLabel')}</label>
            <input className="input" value={jobTitle} onChange={e => setJobTitle(e.target.value)} placeholder={t('jobTitleLabel')} />
          </div>
          <div>
            <label className="input-label">{t('companyLabel')}</label>
            <input className="input" value={company} onChange={e => setCompany(e.target.value)} placeholder={t('companyLabel')} />
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label className="input-label">{t('jobDescription')}</label>
          <textarea className="textarea" style={{minHeight:100}} value={jobDesc} onChange={e => setJobDesc(e.target.value)} placeholder={t('pasteDescription')} />
        </div>
        {mode === 'prepare' && (
          <button className="btn btn-primary" onClick={generateQuestions} disabled={loading}>{loading ? t('generatingQuestions') : t('generateQuestions')}</button>
        )}
        {mode === 'simulate' && !simMessages.length && (
          <button className="btn btn-primary" onClick={startSimulation} disabled={simLoading}>{t('startSimulation')}</button>
        )}
      </div>

      {loading && <div><div className="spinner"/><div className="loading-text">{t('generatingQuestions')}</div></div>}

      {/* Prepare mode results */}
      {mode === 'prepare' && questions.length > 0 && !loading && (
        <div>
          {questions.map((q, i) => (
            <div key={i} className="card" style={{cursor:'pointer'}} onClick={() => setExpandedQ(expandedQ === i ? null : i)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600,fontSize:14}}>{i+1}. {q.question || q}</span>
                <span style={{color:'var(--text-secondary)',fontSize:16}}>{expandedQ === i ? '▲' : '▼'}</span>
              </div>
              {expandedQ === i && q.answer && (
                <div style={{marginTop:12,padding:12,background:'var(--main-bg)',borderRadius:8,fontSize:13,lineHeight:1.7,color:'var(--text-secondary)'}}>
                  <strong>{t('suggestedAnswer')}:</strong><br/>{q.answer}
                </div>
              )}
            </div>
          ))}
          {tips.length > 0 && (
            <div className="card">
              <h3 className="card-title" style={{marginBottom:8}}>{t('companyTips')}</h3>
              <ul style={{paddingLeft:20,fontSize:13,color:'var(--text-secondary)'}}>
                {tips.map((tip,i) => <li key={i} style={{marginBottom:4}}>{tip}</li>)}
              </ul>
            </div>
          )}
          {salaryRange && (
            <div className="card">
              <h3 className="card-title" style={{marginBottom:4}}>{t('salaryEstimate')}</h3>
              <p style={{fontSize:18,fontWeight:700,color:'var(--accent)'}}>{salaryRange}</p>
            </div>
          )}
        </div>
      )}

      {/* Simulate mode */}
      {mode === 'simulate' && simMessages.length > 0 && (
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:13,color:'var(--text-secondary)'}}>{t('questionOf')} {simQuestion} {t('of')} {simTotal}</span>
          </div>
          <div className="progress-bar" style={{marginBottom:16}}><div className="progress-fill" style={{width:`${(simQuestion/simTotal)*100}%`}}/></div>
          <div className="interview-chat">
            {simMessages.map((m,i) => <div key={i} className={`interview-msg ${m.role}`}>{m.text}</div>)}
            {simLoading && <div className="interview-msg ai">...</div>}
            <div ref={bottomRef}/>
          </div>
          {!simDone && (
            <div style={{display:'flex',gap:8}}>
              <textarea className="textarea" style={{minHeight:60}} value={simInput} onChange={e => setSimInput(e.target.value)} placeholder={t('yourAnswer')} onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(); }}} />
              <button className="btn btn-primary" style={{alignSelf:'flex-end'}} onClick={submitAnswer} disabled={simLoading}>{t('submitAnswer')}</button>
            </div>
          )}
          {simDone && simSummary && (
            <div style={{textAlign:'center',padding:20,borderTop:'1px solid var(--border)',marginTop:16}}>
              <h3 style={{marginBottom:8}}>{t('simulationComplete')}</h3>
              <div style={{fontSize:36,fontWeight:700,color:'var(--accent)',marginBottom:8}}>{simSummary.average_score || 0}/10</div>
              <p style={{color:'var(--text-secondary)',fontSize:13,marginBottom:12}}>{t('averageScore')}</p>
              {simSummary.tips && simSummary.tips.length > 0 && (
                <div style={{textAlign:'left'}}>
                  <h4 style={{fontSize:14,marginBottom:8}}>{t('finalTips')}</h4>
                  <ul style={{paddingLeft:20,fontSize:13,color:'var(--text-secondary)'}}>
                    {simSummary.tips.map((tip,i) => <li key={i} style={{marginBottom:4}}>{tip}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---- EMAIL PAGE ---- */
function EmailPage({ toast }) {

    (async () => {
      try { const data = await api('/api/emails'); setEmails(data.emails || data || []); } catch(e) {}
      setEmailsLoading(false);
    })();
  }, []);

      await api('/api/email/send', { method: 'POST', body: JSON.stringify({ to, subject, body, schedule_followup: scheduleFollowup, delay_days: followupDays }) });

        <div style={{marginBottom:12}}>
          <label className="input-label">{t('emailSubject')}</label>
          <input className="input" value={subject} onChange={e => setSubject(e.target.value)} placeholder={t('emailSubject')} />
        </div>
        <div style={{marginBottom:12}}>
          <label className="input-label">{t('emailBody')}</label>
          <textarea className="textarea" style={{minHeight:200}} value={body} onChange={e => setBody(e.target.value)} placeholder={t('emailBody')} />
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
          <label className="checkbox-label">
            <input type="checkbox" checked={scheduleFollowup} onChange={e => setScheduleFollowup(e.target.checked)} />
            {t('scheduleFollowup')}
          </label>
          {scheduleFollowup && (
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <label className="input-label" style={{marginBottom:0}}>{t('followupDays')}</label>
              <input className="input" type="number" value={followupDays} onChange={e => setFollowupDays(parseInt(e.target.value) || 7)} style={{width:80}} min="1" />
            </div>
          )}
        </div>
        <button className="btn btn-primary" onClick={sendEmail} disabled={loading}>{loading ? t('sendingEmail') : t('sendEmail')}</button>
      </div>

      {/* Email History */}
      <div className="card">
        <h3 className="card-title" style={{marginBottom:16}}>{t('emailHistory')}</h3>
        {emailsLoading && <div className="spinner"/>}
        {!emailsLoading && emails.length === 0 && <p style={{color:'var(--text-secondary)',fontSize:14}}>{t('emailEmpty')}</p>}
        {emails.map((em, i) => (
          <div key={i} className="email-item">
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{em.subject}</div>
              <div style={{fontSize:12,color:'var(--text-secondary)'}}>{em.to} · {em.sent_at ? new Date(em.sent_at).toLocaleDateString('fr-FR') : ''}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- ANALYTICS PAGE ---- */
function AnalyticsPage({ toast }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const lineChartRef = useRef(null);
  const pieChartRef = useRef(null);
  const barChartRef = useRef(null);
  const lineChartInstance = useRef(null);
  const pieChartInstance = useRef(null);
  const barChartInstance = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const [statsData, appsData] = await Promise.all([
          api('/api/stats'),
          api('/api/applications')
        ]);
        setData({ stats: statsData, applications: appsData || [] });
      } catch(e) { toast(e.message, 'error'); }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!data || typeof Chart === 'undefined') return;
    const apps = data.applications || [];
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const textColor = isDark ? '#a0a0a0' : '#64748b';
    const gridColor = isDark ? '#2a2a4a' : '#e2e8f0';

    // Line chart - applications per week
    if (lineChartRef.current) {
      if (lineChartInstance.current) lineChartInstance.current.destroy();
      const weekCounts = {};
      apps.forEach(a => {
        const d = new Date(a.applied_at || a.created_at);
        const weekStart = new Date(d); weekStart.setDate(d.getDate() - d.getDay());
        const key = weekStart.toISOString().slice(0, 10);
        weekCounts[key] = (weekCounts[key] || 0) + 1;
      });
      const sortedWeeks = Object.keys(weekCounts).sort().slice(-8);
      lineChartInstance.current = new Chart(lineChartRef.current, {
        type: 'line',
        data: { labels: sortedWeeks.map(w => w.slice(5)), datasets: [{ label: t('applicationsPerWeek'), data: sortedWeeks.map(w => weekCounts[w]), borderColor: '#7c5cfc', backgroundColor: 'rgba(124,92,252,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: textColor }, grid: { color: gridColor } }, y: { ticks: { color: textColor }, grid: { color: gridColor } } }, plugins: { legend: { labels: { color: textColor } } } }
      });
    }

    // Pie chart - status distribution
    if (pieChartRef.current) {
      if (pieChartInstance.current) pieChartInstance.current.destroy();
      const statusCounts = {};
      apps.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });
      const labels = Object.keys(statusCounts);
      const colors = ['#6c63ff', '#22c55e', '#f59e0b', '#ef4444', '#94a3b8'];
      pieChartInstance.current = new Chart(pieChartRef.current, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: labels.map(l => statusCounts[l]), backgroundColor: colors.slice(0, labels.length) }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor } } } }
      });
    }

    // Bar chart - jobs per platform
    if (barChartRef.current) {
      if (barChartInstance.current) barChartInstance.current.destroy();
      const platCounts = data.stats?.jobs_per_platform || {};
      const platLabels = Object.keys(platCounts);
      barChartInstance.current = new Chart(barChartRef.current, {
        type: 'bar',
        data: { labels: platLabels, datasets: [{ label: t('jobsPerPlatform'), data: platLabels.map(p => platCounts[p]), backgroundColor: ['#0a66c2', '#ffcd00', '#2557a7', '#1e3a5f', '#94a3b8'] }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { ticks: { color: textColor }, grid: { color: gridColor } }, y: { ticks: { color: textColor }, grid: { color: gridColor } } }, plugins: { legend: { display: false } } }
      });
    }

    return () => {
      if (lineChartInstance.current) lineChartInstance.current.destroy();
      if (pieChartInstance.current) pieChartInstance.current.destroy();
      if (barChartInstance.current) barChartInstance.current.destroy();
    };
  }, [data]);

  if (loading) return <div><h1 className="page-title">{t('analyticsTitle')}</h1><div className="spinner"/></div>;
  if (!data) return <div><h1 className="page-title">{t('analyticsTitle')}</h1><p>{t('noDataYet')}</p></div>;

  const stats = data.stats || {};
  const apps = data.applications || [];
  const interviewCount = apps.filter(a => a.status === 'interview').length;
  const responseRate = apps.length > 0 ? Math.round((interviewCount / apps.length) * 100) : 0;

  return (
    <div>
      <h1 className="page-title">{t('analyticsTitle')}</h1>
      <div className="stats-row" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card"><div className="stat-number">{responseRate}%</div><div className="stat-label">{t('responseRate')}</div></div>
        <div className="stat-card"><div className="stat-number">{stats.avg_score || 0}</div><div className="stat-label">{t('avgScore')}</div></div>
        <div className="stat-card"><div className="stat-number">{apps.length}</div><div className="stat-label">{t('totalApplications')}</div></div>
        <div className="stat-card"><div className="stat-number">{stats.unseen_alerts || 0}</div><div className="stat-label">{t('totalAlerts')}</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div className="card">
          <h3 className="card-title" style={{marginBottom:12}}>{t('applicationsPerWeek')}</h3>
          <div className="chart-container"><canvas ref={lineChartRef}/></div>
        </div>
        <div className="card">
          <h3 className="card-title" style={{marginBottom:12}}>{t('statusDistribution')}</h3>
          <div className="chart-container"><canvas ref={pieChartRef}/></div>
        </div>
      </div>

      <div className="card">
        <h3 className="card-title" style={{marginBottom:12}}>{t('jobsPerPlatform')}</h3>
        <div className="chart-container"><canvas ref={barChartRef}/></div>
      </div>

      {/* Top companies */}
      {stats.top_companies && stats.top_companies.length > 0 && (
        <div className="card">
          <h3 className="card-title" style={{marginBottom:12}}>{t('topCompanies')}</h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {stats.top_companies.map((c,i) => (
              <span key={i} style={{background:'var(--main-bg)',padding:'6px 14px',borderRadius:20,fontSize:13,fontWeight:500}}>{c.name || c} ({c.count || ''})</span>
            ))}
          </div>
        </div>
      )}

      {/* AI Insights */}
      <div className="card">
        <h3 className="card-title" style={{marginBottom:12}}>{t('aiInsights')}</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:12}}>
          <div style={{padding:16,background:'var(--main-bg)',borderRadius:8,fontSize:13,lineHeight:1.6}}>
            {apps.length < 5 ? t('noDataYet') : `${t('responseRate')}: ${responseRate}% - ${responseRate < 20 ? 'Consider tailoring your CV more' : 'Good response rate!'}`}
          </div>
          <div style={{padding:16,background:'var(--main-bg)',borderRadius:8,fontSize:13,lineHeight:1.6}}>
            {`${t('totalApplications')}: ${apps.length}`}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- CHAT ---- */
function ChatPanel({ onClose }) {
  const [messages, setMessages] = useState([{ role: 'ai', text: t('chatWelcome') }]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const msg = input.trim(); setInput('');
    setMessages(m => [...m, { role: 'user', text: msg }]);
    setLoading(true);
    try {
      const data = await api('/api/chat', { method: 'POST', body: JSON.stringify({ message: msg }) });
      setMessages(m => [...m, { role: 'ai', text: data.response }]);
    } catch(e) { setMessages(m => [...m, { role: 'ai', text: t('chatError') }]); }
    setLoading(false);
  };

  return (
    <div className="chat-panel">
      <div className="chat-header"><span>{t('chatTitle')}</span><button className="chat-close" onClick={onClose}>✕</button></div>
      <div className="chat-messages">
        {messages.map((m,i) => <div key={i} className={`chat-msg ${m.role}`}>{m.text}</div>)}
        {loading && <div className="chat-msg ai">...</div>}
        <div ref={bottomRef}/>
      </div>
      <div className="chat-input-area">
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder={t('chatPlaceholder')} />
        <button onClick={send} disabled={loading}><Icon.Send /></button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
